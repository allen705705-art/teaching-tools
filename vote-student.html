<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課堂投票</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(243,156,18,0.15);
      border: 1px solid rgba(243,156,18,0.3);
      color: #f39c12;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #f39c12; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .question {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    .options { display: flex; flex-direction: column; gap: 12px; }

    .option-btn {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 18px 20px;
      color: #fff;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }
    .option-btn:disabled { cursor: not-allowed; }
    .option-btn.selected {
      border-color: currentColor;
      transform: none;
    }

    .option-label {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .status {
      margin-top: 24px;
      text-align: center;
      font-size: 16px;
      min-height: 22px;
    }
    .status.success { color: #2ecc71; }
    .status.error { color: #e74c3c; }

    .voted-card {
      text-align: center;
      display: none;
      padding: 8px 0 4px;
    }
    .voted-card .big-check { font-size: 56px; margin-bottom: 12px; }
    .voted-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .voted-card p { color: rgba(255,255,255,0.5); font-size: 15px; }
    .voted-answer {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .waiting-state {
      text-align: center;
      padding: 20px 0;
    }
    .waiting-state .icon { font-size: 52px; margin-bottom: 16px; }
    .waiting-state p { color: rgba(255,255,255,0.45); font-size: 16px; }

    .closed-state {
      text-align: center;
      padding: 20px 0;
      display: none;
    }
    .closed-state .icon { font-size: 52px; margin-bottom: 16px; }
    .closed-state p { color: rgba(255,255,255,0.45); font-size: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="top-badge"><div class="dot"></div>課堂即時投票</div>

  <!-- 等待狀態 -->
  <div class="waiting-state" id="waitingState">
    <div class="icon">⏳</div>
    <p>等待老師發布題目中…<br>請稍候</p>
  </div>

  <!-- 投票結束 -->
  <div class="closed-state" id="closedState">
    <div class="icon">⏹️</div>
    <p>投票已結束<br>感謝你的參與！</p>
  </div>

  <!-- 投票區 -->
  <div id="voteArea" style="display:none">
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="status" id="statusMsg"></div>
  </div>

  <!-- 已投票 -->
  <div class="voted-card" id="votedCard">
    <div class="big-check">✅</div>
    <h2>投票完成！</h2>
    <p>你選擇了</p>
    <div class="voted-answer" id="votedAnswer"></div>
    <p style="margin-top:16px;font-size:13px;color:rgba(255,255,255,0.35);">結果會即時顯示在大螢幕上</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, onSnapshot, addDoc, collection, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAov-9uW6FZQmf41-PPJ4-plvqR-Bu6zg4",
    authDomain: "teaching-test-5fd1c.firebaseapp.com",
    projectId: "teaching-test-5fd1c",
    storageBucket: "teaching-test-5fd1c.firebasestorage.app",
    messagingSenderId: "404776287999",
    appId: "1:404776287999:web:6b14120c71c8962fe396ca"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const OPTION_COLORS = ['#e94560','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  const VOTED_KEY = 'poll_voted_option';

  let currentPollId = null;

  // 檢查是否已投票
  function getVotedOption(pollId) {
    return sessionStorage.getItem(VOTED_KEY + '_' + pollId);
  }
  function setVotedOption(pollId, option) {
    sessionStorage.setItem(VOTED_KEY + '_' + pollId, option);
  }

  // 監聽題目變更
  onSnapshot(doc(db, 'poll_config', 'current'), (snap) => {
    if (!snap.exists()) {
      showWaiting();
      return;
    }
    const { question, options, active, updatedAt } = snap.data();
    currentPollId = updatedAt || 'default';

    if (!active) {
      showClosed();
      return;
    }

    const voted = getVotedOption(currentPollId);
    if (voted) {
      showVoted(voted, options);
      return;
    }

    showVoteArea(question, options);
  });

  function showWaiting() {
    document.getElementById('waitingState').style.display = 'block';
    document.getElementById('closedState').style.display = 'none';
    document.getElementById('voteArea').style.display = 'none';
    document.getElementById('votedCard').style.display = 'none';
  }

  function showClosed() {
    document.getElementById('waitingState').style.display = 'none';
    document.getElementById('closedState').style.display = 'block';
    document.getElementById('voteArea').style.display = 'none';
    document.getElementById('votedCard').style.display = 'none';
  }

  function showVoteArea(question, options) {
    document.getElementById('waitingState').style.display = 'none';
    document.getElementById('closedState').style.display = 'none';
    document.getElementById('voteArea').style.display = 'block';
    document.getElementById('votedCard').style.display = 'none';

    document.getElementById('questionText').textContent = question;
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';

    options.forEach((opt, i) => {
      const color = OPTION_COLORS[i % OPTION_COLORS.length];
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.style.color = color;
      btn.innerHTML = `
        <span class="option-label" style="background:${color}22;color:${color}">
          ${String.fromCharCode(65+i)}
        </span>
        <span>${opt}</span>
      `;
      btn.onclick = () => submitVote(opt, color, options);
      container.appendChild(btn);
    });
  }

  async function submitVote(option, color, options) {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    document.getElementById('statusMsg').textContent = '送出中…';
    document.getElementById('statusMsg').className = 'status';

    try {
      await addDoc(collection(db, 'poll_votes'), {
        option,
        timestamp: serverTimestamp()
      });
      setVotedOption(currentPollId, option);
      showVoted(option, options);
    } catch(e) {
      document.getElementById('statusMsg').textContent = '送出失敗，請重試';
      document.getElementById('statusMsg').className = 'status error';
      document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
    }
  }

  function showVoted(option, options) {
    document.getElementById('waitingState').style.display = 'none';
    document.getElementById('voteArea').style.display = 'none';
    document.getElementById('votedCard').style.display = 'block';

    const idx = options ? options.indexOf(option) : -1;
    const color = idx >= 0 ? OPTION_COLORS[idx % OPTION_COLORS.length] : '#2ecc71';
    const label = idx >= 0 ? String.fromCharCode(65+idx) + '. ' : '';

    const el = document.getElementById('votedAnswer');
    el.textContent = label + option;
    el.style.background = color + '22';
    el.style.color = color;
    el.style.border = `1px solid ${color}44`;
  }
</script>
</body>
</html>
