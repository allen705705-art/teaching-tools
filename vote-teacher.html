<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投票牆｜老師控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      color: #fff;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 28px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title { font-size: 20px; font-weight: 700; }
    .title span { color: #f39c12; }
    .badge {
      background: rgba(243,156,18,0.15);
      border: 1px solid rgba(243,156,18,0.3);
      color: #f39c12;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* 左側：設定面板 */
    .panel {
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.07);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #f39c12;
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .options-list { display: flex; flex-direction: column; gap: 8px; }
    .option-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .option-row input { flex: 1; }
    .del-btn {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.25);
      color: #e74c3c;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .del-btn:hover { background: rgba(231,76,60,0.3); }

    .add-option-btn {
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      width: 100%;
      transition: all 0.2s;
    }
    .add-option-btn:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }

    .btn-publish {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      border: none;
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 20px rgba(243,156,18,0.35);
    }
    .btn-publish:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn-publish:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-clear {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.25);
      color: #e74c3c;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-clear:hover { background: rgba(231,76,60,0.22); }

    .status-msg {
      text-align: center;
      font-size: 13px;
      color: #2ecc71;
      min-height: 18px;
    }

    /* 右側：即時結果 */
    .results {
      padding: 28px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .question-display {
      background: rgba(243,156,18,0.08);
      border: 1px solid rgba(243,156,18,0.2);
      border-radius: 16px;
      padding: 20px 24px;
    }
    .question-label {
      font-size: 12px;
      color: #f39c12;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-votes {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }
    .total-votes span {
      font-size: 22px;
      font-weight: 700;
      color: #f39c12;
      margin-right: 4px;
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
      margin-right: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .bars { display: flex; flex-direction: column; gap: 16px; }

    .bar-item { }
    .bar-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .bar-option { font-weight: 600; }
    .bar-count {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .bar-track {
      height: 36px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      min-width: 0;
    }

    .empty-state {
      text-align: center;
      color: rgba(255,255,255,0.2);
      padding: 60px 0;
    }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 18px; }

    .bar-colors {
      --c0: #e94560; --c1: #3498db; --c2: #2ecc71;
      --c3: #f39c12; --c4: #9b59b6; --c5: #1abc9c;
    }
  </style>
</head>
<body class="bar-colors">

<header>
  <div class="title">🗳️ 投票牆｜<span>老師控制台</span></div>
  <span class="badge">👨‍🏫 老師專用</span>
</header>

<div class="main">
  <!-- 左側設定 -->
  <div class="panel">
    <div>
      <div class="section-title">📝 出題設定</div>
      <label>問題</label>
      <textarea id="questionInput" rows="3" placeholder="輸入你的問題，例如：今天學到最重要的概念是？"></textarea>
    </div>

    <div>
      <label>選項（最多 6 個）</label>
      <div class="options-list" id="optionsList"></div>
      <button class="add-option-btn" onclick="addOption()">＋ 新增選項</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn-publish" id="publishBtn" onclick="publishPoll()">🚀 發布題目</button>
      <button class="btn-clear" onclick="clearVotes()">🗑️ 清除本題投票數</button>
      <button class="btn-clear" style="border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);" onclick="closePoll()">⏹️ 結束投票</button>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div style="border-top:1px solid rgba(255,255,255,0.07);padding-top:16px;">
      <div class="section-title">🔗 學生投票連結</div>
      <div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px;font-size:13px;color:rgba(255,255,255,0.5);word-break:break-all;" id="studentUrl">載入中…</div>
    </div>
  </div>

  <!-- 右側結果 -->
  <div class="results">
    <div class="question-display" id="questionDisplay" style="display:none">
      <div class="question-label">📌 目前題目</div>
      <div class="question-text" id="questionText">—</div>
    </div>

    <div class="results-header">
      <div><span class="live-dot"></span>即時結果</div>
      <div class="total-votes">總票數：<span id="totalVotes">0</span> 票</div>
    </div>

    <div class="bars" id="barsContainer">
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>發布題目後，投票結果會即時顯示在這裡</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, deleteDoc, updateDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAov-9uW6FZQmf41-PPJ4-plvqR-Bu6zg4",
    authDomain: "teaching-test-5fd1c.firebaseapp.com",
    projectId: "teaching-test-5fd1c",
    storageBucket: "teaching-test-5fd1c.firebasestorage.app",
    messagingSenderId: "404776287999",
    appId: "1:404776287999:web:6b14120c71c8962fe396ca"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const OPTION_COLORS = ['#e94560','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];

  // 設定學生連結
  const baseUrl = location.href.replace('vote-teacher.html','vote-student.html');
  document.getElementById('studentUrl').textContent = baseUrl;

  // 動態選項管理
  let optionCount = 0;

  window.addOption = function(val='') {
    if (optionCount >= 6) return;
    optionCount++;
    const idx = document.querySelectorAll('.option-row').length;
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `
      <input type="text" placeholder="選項 ${String.fromCharCode(65+idx)}" value="${val}" />
      <button class="del-btn" onclick="this.parentElement.remove()">×</button>
    `;
    document.getElementById('optionsList').appendChild(row);
  };

  // 預設加 2 個選項
  addOption(); addOption();

  // 發布題目
  window.publishPoll = async function() {
    const question = document.getElementById('questionInput').value.trim();
    const optionInputs = document.querySelectorAll('.option-row input');
    const options = [...optionInputs].map(i => i.value.trim()).filter(Boolean);

    if (!question) { showStatus('請輸入問題！', 'error'); return; }
    if (options.length < 2) { showStatus('至少需要 2 個選項！', 'error'); return; }

    document.getElementById('publishBtn').disabled = true;
    try {
      await setDoc(doc(db, 'poll_config', 'current'), {
        question, options, active: true, updatedAt: new Date().toISOString()
      });
      // 清除舊投票
      const snap = await getDocs(collection(db, 'poll_votes'));
      await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
      showStatus('✅ 題目已發布！學生可以開始投票。', 'success');
    } catch(e) {
      showStatus('發布失敗：' + e.message, 'error');
    }
    document.getElementById('publishBtn').disabled = false;
  };

  // 清除票數
  window.clearVotes = async function() {
    if (!confirm('確定清除本題所有投票數？')) return;
    const snap = await getDocs(collection(db, 'poll_votes'));
    await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
    showStatus('✅ 票數已清除', 'success');
  };

  // 結束投票
  window.closePoll = async function() {
    await updateDoc(doc(db, 'poll_config', 'current'), { active: false });
    showStatus('⏹️ 投票已結束', 'success');
  };

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.style.color = type === 'error' ? '#e74c3c' : '#2ecc71';
    setTimeout(() => el.textContent = '', 4000);
  }

  // 監聽設定
  onSnapshot(doc(db, 'poll_config', 'current'), (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    document.getElementById('questionText').textContent = data.question || '';
    document.getElementById('questionDisplay').style.display = 'block';
  });

  // 監聽投票結果
  onSnapshot(collection(db, 'poll_votes'), async (snap) => {
    const configSnap = await getDoc(doc(db, 'poll_config', 'current'));
    if (!configSnap.exists()) return;
    const { question, options } = configSnap.data();

    // 計票
    const counts = {};
    options.forEach(o => counts[o] = 0);
    snap.forEach(d => {
      const opt = d.data().option;
      if (counts.hasOwnProperty(opt)) counts[opt]++;
    });

    const total = snap.size;
    document.getElementById('totalVotes').textContent = total;

    const container = document.getElementById('barsContainer');
    container.innerHTML = '';

    const maxCount = Math.max(...Object.values(counts), 1);

    options.forEach((opt, i) => {
      const count = counts[opt] || 0;
      const pct = total > 0 ? Math.round(count / total * 100) : 0;
      const barWidth = Math.round(count / maxCount * 100);
      const color = OPTION_COLORS[i % OPTION_COLORS.length];

      const item = document.createElement('div');
      item.className = 'bar-item';
      item.innerHTML = `
        <div class="bar-header">
          <span class="bar-option">${String.fromCharCode(65+i)}. ${opt}</span>
          <span class="bar-count">${count} 票（${pct}%）</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${barWidth}%;background:${color};">
            ${pct > 10 ? pct + '%' : ''}
          </div>
        </div>
      `;
      container.appendChild(item);
    });
  });
</script>
</body>
</html>
